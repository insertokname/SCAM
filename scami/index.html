<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>S.C.A.M.</title>
    <link data-trunk rel="rust" data-wasm-opt="0" />
    <link data-trunk rel="copy-file" href="src/nestest.nes" />
    <link data-trunk rel="copy-file" href="src/AccuracyCoin.nes" />
    <style>
      :root {
        --bg0-h: #1d2021;
        --bg0: #282828;
        --bg1: #3c3836;
        --bg2: #504945;
        --bg3: #665c54;
        --fg: #ebdbb2;
        --fg2: #d5c4a1;
        --fg4: #bdae93;
        --yellow: #d79921;
        --orange: #d65d0e;
        --green: #98971a;
        --aqua: #689d6a;

        /* -- type scale (all sizes relative to 16px root) -- */
        --text-xs: 0.75rem; /* 12px */
        --text-sm: 0.875rem; /* 14px */
        --text-base: 1rem; /* 16px */
        --text-md: 1.125rem; /* 18px */
        --text-lg: 1.25rem; /* 20px */
        --text-xl: 1.5rem; /* 24px */
      }

      /* -- reset -- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px; /* explicit root; 1rem = 16px everywhere */
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg0-h);
        color: var(--fg);
        font-family: "Courier New", Courier, monospace;
        font-size: var(--text-base);
        line-height: 1.5;
        display: flex;
        flex-direction: column;
      }

      /* -- top bar -- */
      #topbar {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.5rem 0.875rem;
        background: var(--bg1);
        border-bottom: 1px solid var(--bg2);
        flex-wrap: wrap;
        flex-shrink: 0;
      }

      .brand {
        color: var(--yellow);
        font-weight: bold;
        letter-spacing: 0.1em;
        font-size: var(--text-md);
        user-select: none;
      }

      #load-btn {
        display: none;
        color: var(--fg);
        background: var(--bg2);
        border: 1px solid var(--bg3);
        padding: 0.25rem 0.75rem;
        font-family: inherit;
        font-size: var(--text-sm);
        line-height: 1.4;
        cursor: pointer;
      }
      #load-btn:hover {
        background: var(--bg3);
      }

      #rom-name {
        color: var(--fg2);
        font-size: var(--text-sm);
      }

      #status {
        color: var(--fg4);
        font-size: var(--text-sm);
        margin-left: auto;
      }

      /* -- fetch bar -- */
      #fetch-bar {
        display: none;
        height: 4px;
        background: var(--bg2);
        border-bottom: 1px solid var(--bg3);
        overflow: hidden;
        flex-shrink: 0;
      }

      #fetch-bar.active {
        display: block;
      }

      .fetch-bar-fill {
        height: 100%;
        width: 30%;
        background: var(--yellow);
        animation: fetch-slide 1.1s linear infinite;
        will-change: transform;
      }

      @keyframes fetch-slide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(400%);
        }
      }

      /* -- canvas host -- */
      #canvas-host {
        flex: 1;
        position: relative;
        background: #000;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #nes-canvas,
      .nes-canvas {
        display: block !important;
        width: min(100%, 768px) !important;
        height: auto !important;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* -- launcher overlay -- */
      #launcher {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.82);
        transition: opacity 0.15s;
      }
      #launcher.gone {
        opacity: 0;
        pointer-events: none;
      }

      #launcher-card {
        position: relative;
        background: var(--bg1);
        border: 1px solid var(--bg3);
        padding: 2rem 2.25rem 1.75rem;
        min-width: 18rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      #launcher-close {
        display: none;
        position: absolute;
        top: 0.625rem;
        right: 0.75rem;
        background: none;
        border: none;
        color: var(--fg4);
        font-size: var(--text-md);
        line-height: 1;
        cursor: pointer;
        font-family: inherit;
      }
      #launcher-close:hover {
        color: var(--fg);
      }
      #launcher-close.visible {
        display: block;
      }

      .card-title {
        color: var(--yellow);
        font-size: var(--text-xl);
        font-weight: bold;
        letter-spacing: 0.12em;
        text-align: center;
      }

      .card-sub {
        color: var(--fg4);
        font-size: var(--text-sm);
        text-align: center;
        margin-top: -0.75rem;
      }

      .launcher-section-label {
        color: var(--fg4);
        font-size: var(--text-xs);
        letter-spacing: 0.08em;
        border-bottom: 1px solid var(--bg2);
        padding-bottom: 0.25rem;
        margin-bottom: 0.5rem;
      }

      .launcher-btn {
        width: 100%;
        text-align: left;
        color: var(--fg);
        background: var(--bg2);
        border: 1px solid var(--bg3);
        padding: 0.5rem 0.875rem;
        font-family: inherit;
        font-size: var(--text-base);
        line-height: 1.4;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.625rem;
      }
      .launcher-btn + .launcher-btn {
        margin-top: 0.375rem;
      }
      .launcher-btn:hover {
        background: var(--bg3);
        border-color: var(--fg4);
      }
      .launcher-btn:disabled {
        opacity: 0.4;
        cursor: default;
        background: var(--bg2);
        border-color: var(--bg3);
      }

      .launcher-btn .btn-icon {
        font-size: var(--text-base);
        flex-shrink: 0;
        width: 1.25rem;
        text-align: center;
      }
      .launcher-btn .btn-text {
        flex: 1;
      }
      .launcher-btn .btn-tag {
        font-size: var(--text-xs);
        color: var(--fg4);
        border: 1px solid var(--bg3);
        padding: 0.1rem 0.375rem;
        flex-shrink: 0;
      }

      .launcher-btn.accent-green .btn-icon {
        color: var(--green);
      }
      .launcher-btn.accent-aqua .btn-icon {
        color: var(--aqua);
      }
      .launcher-btn.accent-yellow .btn-icon {
        color: var(--yellow);
      }

      .launcher-divider {
        border: none;
        border-top: 1px solid var(--bg2);
        margin: 0;
      }

      /* -- keybinds bar -- */
      #keybinds {
        flex-shrink: 0;
        padding: 0.5rem 1rem;
        background: var(--bg1);
        border-top: 1px solid var(--bg2);
        overflow-x: auto;
        display: flex;
        gap: 1.25rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .kb-group {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        white-space: nowrap;
      }

      .kb-label {
        color: var(--fg4);
        font-size: var(--text-sm);
        margin-right: 0.25rem;
      }

      .kb-sep {
        color: var(--bg3);
        font-size: var(--text-sm);
      }

      .kb-key {
        color: var(--fg);
        background: var(--bg2);
        border: 1px solid var(--bg3);
        border-radius: 2px;
        padding: 0.1rem 0.4rem;
        font-size: var(--text-sm);
        font-family: inherit;
      }

      /* -- toast -- */
      #toast {
        position: fixed;
        top: 3.5rem;
        right: 1rem;
        z-index: 20;
        background: var(--bg1);
        border: 1px solid var(--orange);
        color: var(--fg);
        padding: 0.5rem 0.75rem;
        font-size: var(--text-sm);
        letter-spacing: 0.02em;
        opacity: 0;
        transform: translateY(-6px);
        transition: opacity 0.2s, transform 0.2s;
        pointer-events: none;
      }

      #toast.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <input id="rom-input" type="file" accept=".nes" style="display: none" />

    <div id="topbar">
      <span class="brand">S.C.A.M.</span>
      <button id="load-btn" onclick="showLauncher(); this.blur()">
        load ROM...
      </button>
      <span id="rom-name"></span>
      <span id="status">booting...</span>
    </div>

    <div id="fetch-bar" aria-hidden="true">
      <div class="fetch-bar-fill"></div>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <div id="canvas-host">
      <div id="launcher">
        <div id="launcher-card">
          <button
            id="launcher-close"
            onclick="hideLauncher()"
            title="back to game"
          >
            ×
          </button>

          <div class="card-title">Load a ROM</div>

          <div>
            <div class="launcher-section-label">Games</div>
            <button
              class="launcher-btn accent-green"
              disabled
              onclick="loadPredefined(`https://archive.org/download/NESMegaPack201808/ROMS.zip/World%2FDonkey%20Kong%20%28JU%29.nes`, 'World/Donkey Kong (JU).nes')"
            >
              <span class="btn-text">Donkey kong</span>
            </button>
            <button
              class="launcher-btn accent-aqua"
              disabled
              onclick="loadPredefined(`https://archive.org/download/NESMegaPack201808/ROMS.zip/World%2FSuper%20Mario%20Bros%20%28JU%29%20%28PRG%200%29.nes`, 'World/Super Mario Bros (JU) (PRG 0).nes')"
            >
              <span class="btn-text">Super Mario Bros.</span>
            </button>
          </div>

          <div>
            <div class="launcher-section-label">Testing ROMs</div>
            <button
              class="launcher-btn accent-green"
              disabled
              onclick="loadPredefined('nestest.nes', 'nestest.nes')"
            >
              <span class="btn-text">nestest</span>
            </button>
            <button
              class="launcher-btn accent-aqua"
              disabled
              onclick="loadPredefined('AccuracyCoin.nes', 'AccuracyCoin.nes')"
            >
              <span class="btn-text">AccuracyCoin</span>
            </button>
          </div>

          <hr class="launcher-divider" />

          <div>
            <div class="launcher-section-label">Bring your own</div>
            <button
              class="launcher-btn accent-yellow"
              id="btn-file"
              disabled
              onclick="openFilePicker()"
            >
              <span class="btn-icon">▶</span>
              <span class="btn-text">open .nes file...</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="keybinds">
      <div class="kb-group">
        <span class="kb-label">d-pad</span>
        <span class="kb-key">W</span><span class="kb-key">A</span
        ><span class="kb-key">S</span><span class="kb-key">D</span>
        <span class="kb-sep">/</span>
        <span class="kb-key">↑</span><span class="kb-key">←</span
        ><span class="kb-key">↓</span><span class="kb-key">→</span>
      </div>
      <div class="kb-group">
        <span class="kb-label">A</span>
        <span class="kb-key">J</span><span class="kb-sep">/</span
        ><span class="kb-key">Z</span>
      </div>
      <div class="kb-group">
        <span class="kb-label">B</span>
        <span class="kb-key">K</span><span class="kb-sep">/</span
        ><span class="kb-key">X</span>
      </div>
      <div class="kb-group">
        <span class="kb-label">start</span>
        <span class="kb-key">Enter</span><span class="kb-sep">/</span
        ><span class="kb-key">C</span>
      </div>
      <div class="kb-group">
        <span class="kb-label">select</span>
        <span class="kb-key">RShift</span><span class="kb-sep">/</span
        ><span class="kb-key">V</span>
      </div>
    </div>

    <script type="module">
      const romInput = document.getElementById("rom-input");
      const romName = document.getElementById("rom-name");
      const status = document.getElementById("status");
      const launcher = document.getElementById("launcher");
      const launcherCard = document.getElementById("launcher-card");
      const launcherClose = document.getElementById("launcher-close");
      const loadBtn = document.getElementById("load-btn");
      const launcherBtns = document.querySelectorAll(".launcher-btn");
      const fetchBar = document.getElementById("fetch-bar");
      const toast = document.getElementById("toast");

      let wasmReady = false;
      let emulationStarted = false;
      let hasLoadedRom = false;

      let toastTimer = null;

      // --- Tab-visibility pause state ---
      // True when the emulator was running but we auto-paused due to tab hide.
      let autoSuspended = false;

      function setPaused(paused) {
        const b = window.wasmBindings;
        if (b && typeof b.set_paused === "function") b.set_paused(paused);
      }

      function setFetchBarActive(active) {
        if (!fetchBar) return;
        fetchBar.classList.toggle("active", active);
      }

      function showToast(message) {
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add("visible");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.classList.remove("visible");
        }, 3200);
      }

      // ---------- tab-visibility guard ----------
      // When the page becomes hidden we pause the emulator so it doesn't spin
      // in the background (browsers throttle rAF anyway, which causes the
      // giant time-debt that makes it skip when you return).
      // We resume automatically when the page becomes visible again, but only
      // if *we* were the ones who paused it (don't cancel a user-initiated
      // pause or launcher-pause).
      document.addEventListener("visibilitychange", () => {
        if (!hasLoadedRom || !emulationStarted) return;

        if (document.hidden) {
          // Only auto-suspend if the emulator is currently running (launcher gone,
          // status "running") so we don't clobber a deliberate user pause.
          const isRunning = launcher.classList.contains("gone");
          if (isRunning) {
            autoSuspended = true;
            setPaused(true);
            // No need to update the status text — the user can't see it anyway.
          }
        } else {
          if (autoSuspended) {
            autoSuspended = false;
            // Reset the WASM-side timestamp so it doesn't accumulate a huge
            // delta covering the whole background period.
            const b = window.wasmBindings;
            if (b && typeof b.reset_timestamp === "function") {
              b.reset_timestamp();
            }
            setPaused(false);
            status.textContent = "running";
          }
        }
      });

      // ---------- window-focus guard ----------
      // Some browsers keep rAF alive even when another window has focus but
      // the tab is still visible (e.g. alt-tab to a different app on macOS).
      // We pause on blur and resume on focus for full coverage.
      window.addEventListener("blur", () => {
        if (!hasLoadedRom || !emulationStarted) return;
        const isRunning = launcher.classList.contains("gone");
        if (isRunning && !autoSuspended) {
          autoSuspended = true;
          setPaused(true);
        }
      });

      window.addEventListener("focus", () => {
        if (!hasLoadedRom || !emulationStarted) return;
        if (autoSuspended) {
          autoSuspended = false;
          const b = window.wasmBindings;
          if (b && typeof b.reset_timestamp === "function") {
            b.reset_timestamp();
          }
          setPaused(false);
          status.textContent = "running";
        }
      });
      // ------------------------------------------

      function onWasmReady() {
        if (wasmReady) return;
        wasmReady = true;
        status.textContent = "ready";
        launcherBtns.forEach((b) => (b.disabled = false));
      }
      window.addEventListener("TrunkApplicationStarted", onWasmReady, {
        once: true,
      });
      if (window.wasmBindings) onWasmReady();

      function ensureStarted() {
        if (emulationStarted) return;
        emulationStarted = true;
        const b = window.wasmBindings;
        if (b && typeof b.start_emulation === "function") b.start_emulation();
      }

      async function loadRomBytes(bytes, name) {
        const b = window.wasmBindings;
        if (!b || typeof b.load_rom !== "function") return;
        romName.textContent = name;
        status.textContent = "loading...";
        try {
          b.load_rom(new Uint8Array(bytes));
          status.textContent = "running";
          if (!hasLoadedRom) {
            hasLoadedRom = true;
            launcherClose.classList.add("visible");
            loadBtn.style.display = "block";
          }
          hideLauncher();
        } catch (err) {
          console.error(err);
          status.textContent = "error";
        }
      }

      window.showLauncher = function () {
        launcher.classList.remove("gone");
        setPaused(true);
        status.textContent = hasLoadedRom ? "paused" : "ready";
      };

      window.hideLauncher = function () {
        if (hasLoadedRom) {
          launcher.classList.add("gone");
          // Reset timestamp so whatever time was spent in the launcher
          // doesn't produce a catch-up burst.
          const b = window.wasmBindings;
          if (b && typeof b.reset_timestamp === "function") {
            b.reset_timestamp();
          }
          setPaused(false);
          status.textContent = "running";
          // Move focus away from any launcher button so that Enter/Space
          // keypresses go to the emulator canvas instead of re-triggering
          // the last-focused button.
          if (
            document.activeElement &&
            document.activeElement !== document.body
          ) {
            document.activeElement.blur();
          }
          const canvas =
            document.getElementById("nes-canvas") ||
            document.querySelector("canvas");
          if (canvas) canvas.focus();
        }
      };

      launcher.addEventListener("click", (e) => {
        if (!hasLoadedRom) return;
        if (e.target === launcher) {
          hideLauncher();
        }
      });

      // Prevent Enter/Space from re-firing the last focused launcher button
      // after the launcher has already handled the action and closed.
      // Also allow Escape to dismiss the launcher.
      document.addEventListener("keydown", (e) => {
        if (!launcher.classList.contains("gone")) {
          // Launcher is open — let buttons handle Enter/Space normally,
          // but swallow any stray Enter that has no focused target inside
          // the launcher (e.g. focus already blurred after a click).
          if (
            (e.key === "Enter" || e.key === " ") &&
            (!document.activeElement ||
              !launcher.contains(document.activeElement))
          ) {
            e.preventDefault();
          }
          if (e.key === "Escape" && hasLoadedRom) {
            hideLauncher();
          }
        }
      });

      launcherCard.addEventListener("click", (e) => {
        e.stopPropagation();
      });

      window.loadPredefined = async function (path, name) {
        if (!wasmReady) return;
        ensureStarted();
        status.textContent = "fetching...";
        setFetchBarActive(true);
        try {
          const resp = await fetch(path);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const buf = await resp.arrayBuffer();
          await loadRomBytes(buf, name);
        } catch (err) {
          console.error(err);
          status.textContent = "fetch error";
          showToast("Fetch failed. Check your connection or try another ROM.");
        } finally {
          setFetchBarActive(false);
        }
      };

      window.openFilePicker = function () {
        if (!wasmReady) return;
        ensureStarted();
        romInput.click();
      };

      romInput.addEventListener("change", async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const buf = await file.arrayBuffer();
        await loadRomBytes(buf, file.name);
        e.target.value = "";
      });
    </script>
  </body>
</html>
